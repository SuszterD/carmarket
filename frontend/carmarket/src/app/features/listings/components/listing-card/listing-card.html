<div class="listing-card">
  <h3>{{ listing.brand }} {{ listing.model }}</h3>

  <p>Évjárat: {{ listing.year }}</p>
  <p>Ár: {{ listing.price }} Ft</p>
  <p>Km. óra állás: {{ listing.mileage }} km</p>
  <p>Üzemanyag: {{ listing.fuel_type }}</p>

  <p>{{ listing.description }}</p>
  <button [routerLink]="['/listings/edit', listing.id]">Hirdetés szerkesztése</button>
  <button (click)="deleteListing()">Hirdetés törlése</button>
</div>
