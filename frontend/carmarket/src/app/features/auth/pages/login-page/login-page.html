<h2>Bejelentkezés</h2>

<form [formGroup]="form" (ngSubmit)="submit()">
  <div class="form-fields">
    <div class="form-row">
      <label>Felhasználónév</label>
      <input class="with-space" formControlName="username" placeholder="Felhasználónév" />
    </div>
    <div class="form-row">
      <label>Jelszó</label>
      <input class="with-space" type="password" formControlName="password" placeholder="Jelszó" />
    </div>
  </div>

  @if (errorMessage()) {
    <p class="error-message">{{ errorMessage() }}</p>
  }

  <div class="form-buttons">
    <button type="submit" [disabled]="form.invalid">Bejelentkezés</button>
  </div>
</form>
