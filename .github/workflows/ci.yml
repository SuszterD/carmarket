name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup/buildx-action@v3

      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/carmarket-backend ./backend

      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/carmarket-frontend ./frontend/carmarket

      - name: Push backend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/carmarket-backend

      - name: Push frontend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/carmarket-frontend
