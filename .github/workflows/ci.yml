name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: |
          cd frontend/carmarket
          npm install

      - run: |
          cd frontend/carmarket
          npm run test -- --watch=false

  backend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - run: |
          cd backend
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - run: |
          cd backend
          source venv/bin/activate
          pytest

  build-and-push:
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract commit SHA
        id: vars
        run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build backend image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/carmarket-backend:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/carmarket-backend:${{ steps.vars.outputs.SHA }} \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/carmarket-frontend:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/carmarket-frontend:${{ steps.vars.outputs.SHA }} \
            ./frontend/carmarket

      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/carmarket-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/carmarket-backend:${{ steps.vars.outputs.SHA }}

      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/carmarket-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/carmarket-frontend:${{ steps.vars.outputs.SHA }}

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d
