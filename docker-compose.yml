services:
  postgres:
    image: postgres:16
    container_name: carmarket_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: carmarket

    ports:
      - "5432:5432"

    volumes:
      - "postgres_data:/var/lib/postgresql/data"

  backend:
    build: ./backend
    container_name: carmarket_backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env.docker

    depends_on:
      - postgres

  frontend:
    build: ./frontend/carmarket
    container_name: carmarket_frontend

    ports:
      - "4200:80"

    depends_on:
      - backend

volumes:
  postgres_data:
